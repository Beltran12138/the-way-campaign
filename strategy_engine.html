<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE WAY — Growth Flywheel × EA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#A8BDD0;display:flex;justify-content:center;
  align-items:center;min-height:100vh;
  font-family:'Inter',-apple-system,sans-serif;
}
.slide{
  width:1280px;height:720px;background:#fff;
  position:relative;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.28);
}
</style>
</head>
<body>
<div class="slide">
<svg id="dia" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"></svg>
</div>
<script>
const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('dia');
const W=1280,H=720;
const CY='#00BCD4',CY2='#00ACC1',NAVY='#002766',DARK='#003A8C',GREY='#607080';

const el=(t,a={})=>{const e=document.createElementNS(NS,t);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,String(v)));return e;};
const app=(p,...c)=>{c.forEach(x=>p.appendChild(x));return p;};
const tx=(a,t)=>{const e=el('text',a);e.textContent=t;return e;};

/* ─── DEFS ─────────────────────────────────────────────────── */
const defs=el('defs');

// Title gradient blue→purple
const tg=el('linearGradient',{id:'tg',x1:'0%',y1:'0%',x2:'100%',y2:'0%'});
app(tg,el('stop',{offset:'0%','stop-color':'#1890FF'}),
       el('stop',{offset:'55%','stop-color':'#6E8EF5'}),
       el('stop',{offset:'100%','stop-color':'#9B59B6'}));
app(defs,tg);

// EA badge gradient
const eg=el('linearGradient',{id:'eg',x1:'0%',y1:'0%',x2:'100%',y2:'0%'});
app(eg,el('stop',{offset:'0%','stop-color':'#002766'}),
       el('stop',{offset:'100%','stop-color':'#0050B3'}));
app(defs,eg);

// Arrow marker – solid cyan
const mkArr=(id,col,sz=7)=>{
  const m=el('marker',{id,markerWidth:sz,markerHeight:sz,refX:sz-0.5,refY:sz/2,orient:'auto'});
  app(m,el('polygon',{points:`0 0,${sz} ${sz/2},0 ${sz}`,fill:col}));
  return m;
};
app(defs,mkArr('arrS',CY,7),mkArr('arrD',CY+'99',7));
svg.appendChild(defs);

/* ─── BACKGROUND ────────────────────────────────────────────── */
app(svg,el('rect',{x:0,y:0,width:W,height:H,fill:'#fff'}));
for(let x=32;x<W;x+=40)for(let y=32;y<H;y+=40)
  app(svg,el('circle',{cx:x,cy:y,r:0.9,fill:'#C8E2EE'}));
// Top accent bar
app(svg,el('rect',{x:0,y:0,width:W,height:3,fill:'url(#tg)'}));

/* ─── HEADER ─────────────────────────────────────────────────── */
app(svg,
  tx({x:32,y:55,'font-size':40,'font-weight':900,'font-family':'Inter,sans-serif',fill:'url(#tg)'},'Growth Flywheel'),
  tx({x:34,y:73,'font-size':9,'font-weight':700,'letter-spacing':'0.2em','font-family':'Inter,sans-serif',fill:CY},'× EFFECTIVE ALTRUISM  ·  IMPACT VALIDATED AT EVERY STAGE'),
  tx({x:218,y:100,'text-anchor':'middle','font-size':7.5,'font-weight':700,'letter-spacing':'0.18em','font-family':'Inter,sans-serif',fill:CY},'— DONOR JOURNEY LOOP'),
  tx({x:1062,y:100,'text-anchor':'middle','font-size':7.5,'font-weight':700,'letter-spacing':'0.18em','font-family':'Inter,sans-serif',fill:CY},'VIRAL GROWTH LOOP —')
);

/* ─── NODE DATA ──────────────────────────────────────────────── */
// r: circle radius. big nodes (CELEBRATE, CONNECT) use r=38, others r=32
// EA tag is placed at y = n.y + r + 50 (center of pill)
const N=[
  // 0: CELEBRATE (top-center, big)
  {num:'',  lbl:'CELEBRATE', emo:'🏆', r:38,
   sub:'Owner Cert · GPS · #TheWayHK',
   ea:'EA · Long-term · 15–20yr identity cycle',
   x:640, y:148},
  // 1: FEEL
  {num:'01', lbl:'FEEL', emo:'🚶‍♀️', r:32,
   sub:'Immersive film · empathy shock',
   ea:'EA · Scale · 3.4B without WASH',
   x:218, y:245},
  // 2: TRACK
  {num:'02', lbl:'TRACK', emo:'📍', r:32,
   sub:'Free toilet tracking · Freemium',
   ea:'EA · Neglected · philanthropy blind spot',
   x:160, y:395},
  // 3: GIVE (filled, conversion node)
  {num:'03', lbl:'GIVE', emo:'🏗️', r:32, filled:true,
   sub:'Subscribe / Group Fund / Full Owner',
   ea:'EA · Tractable · HK$3,500 = 1 toilet',
   x:222, y:535},
  // 4: CONNECT (big)
  {num:'04', lbl:'CONNECT', emo:'📊', r:38,
   sub:'Impact Dashboard · AI monthly report',
   ea:'EA · Cost-eff. · $11/DALY · 4.8× ROI',
   x:658, y:560},
  // 5: SHARE
  {num:'05', lbl:'SHARE', emo:'📱', r:32,
   sub:'#IAmToiletOwner · Referral · WhatsApp',
   ea:'EA · Multiplier · each owner = node',
   x:1055, y:252},
  // 6: REACH
  {num:'06', lbl:'REACH', emo:'👁️', r:32,
   sub:'New audience enters the loop → FEEL',
   ea:'EA · Scale ↗ · flywheel compounds',
   x:1097, y:422},
];

/* ─── EDGE POINT HELPERS ─────────────────────────────────────── */
// Point on node circumference toward direction of cp
const startEdge=(n,cp)=>{
  const dx=cp.x-n.x,dy=cp.y-n.y,l=Math.sqrt(dx*dx+dy*dy);
  return l?{x:n.x+dx/l*(n.r+3),y:n.y+dy/l*(n.r+3)}:{x:n.x,y:n.y};
};
// Point on node circumference coming FROM direction of cp
const endEdge=(n,cp)=>{
  const dx=n.x-cp.x,dy=n.y-cp.y,l=Math.sqrt(dx*dx+dy*dy);
  return l?{x:n.x-dx/l*(n.r+3),y:n.y-dy/l*(n.r+3)}:{x:n.x,y:n.y};
};

/* ─── CONNECTIONS ────────────────────────────────────────────── */
// [fromIdx, toIdx, [controlPoints...], dashed]
const CONN=[
  [1, 2, [{x:140, y:318}],           false],  // FEEL → TRACK
  [2, 3, [{x:144, y:468}],           false],  // TRACK → GIVE
  [3, 4, [{x:438, y:602}],           false],  // GIVE → CONNECT
  [4, 0, [{x:848, y:432},{x:848, y:200}], false], // CONNECT → CELEBRATE
  [0, 5, [{x:855, y:86}],            false],  // CELEBRATE → SHARE
  [5, 6, [{x:1140, y:336}],          false],  // SHARE → REACH
  // Outer dashed return loop — routed around bottom, clear of all nodes/labels
  [6, 1, [{x:1180, y:710},{x:70, y:710}], true], // REACH → FEEL (outer dashed)
  [0, 1, [{x:382, y:190}],               true], // CELEBRATE → FEEL (inner dashed, closes loop)
];

CONN.forEach(([fi,ti,cps,dash])=>{
  const fn=N[fi],tn=N[ti];
  const s=startEdge(fn,cps[0]);
  const e2=endEdge(tn,cps[cps.length-1]);
  let d;
  if(cps.length===1){
    d=`M${s.x.toFixed(1)},${s.y.toFixed(1)} Q${cps[0].x},${cps[0].y} ${e2.x.toFixed(1)},${e2.y.toFixed(1)}`;
  } else {
    d=`M${s.x.toFixed(1)},${s.y.toFixed(1)} C${cps[0].x},${cps[0].y} ${cps[1].x},${cps[1].y} ${e2.x.toFixed(1)},${e2.y.toFixed(1)}`;
  }
  app(svg, el('path',{
    d, fill:'none',
    stroke: dash ? CY+'80' : CY,
    'stroke-width': dash ? 1.6 : 2.4,
    'stroke-dasharray': dash ? '9 5' : 'none',
    'marker-end': dash ? 'url(#arrD)' : 'url(#arrS)',
  }));
});

/* ─── CENTER HUB ─────────────────────────────────────────────── */
const CHX=578, CHY=396, CHR=70;
app(svg,
  el('circle',{cx:CHX,cy:CHY,r:CHR,fill:'#fff',stroke:CY,'stroke-width':2.5}),
  el('circle',{cx:CHX,cy:CHY,r:CHR-11,fill:'none',stroke:CY,'stroke-width':0.85,opacity:0.35}),
  tx({x:CHX,y:CHY-17,'text-anchor':'middle','dominant-baseline':'middle',
      'font-size':15.5,'font-weight':900,'font-family':'Inter,sans-serif',fill:'#0A1628'},'THE WAY'),
  tx({x:CHX,y:CHY+3,'text-anchor':'middle','dominant-baseline':'middle',
      'font-size':12,'font-weight':700,'font-family':'Inter,sans-serif',fill:CY},'HK$3,500'),
  tx({x:CHX,y:CHY+20,'text-anchor':'middle','dominant-baseline':'middle',
      'font-size':7,'font-weight':500,'letter-spacing':'0.14em','font-family':'Inter,sans-serif',fill:'#8C8C8C'},'DIGNITY ENGINE')
);

/* ─── DRAW NODES — PASS 1: circles, emoji, labels, EA tags ───── */
N.forEach(n=>{
  const {x,y,r,filled,num,lbl,emo,sub,ea} = n;

  // Circle body (drawn first so badge renders on top in pass 2)
  app(svg, el('circle',{cx:x,cy:y,r:r,
    fill: filled?CY:'#fff',
    stroke: CY, 'stroke-width': filled?0:2.5
  }));

  // Emoji (inside circle)
  app(svg, tx({x:x,y:y,'text-anchor':'middle','dominant-baseline':'middle',
    'font-size':22,'font-family':'Inter,sans-serif'}, emo));

  // Stage label (below circle, bold cyan)
  app(svg, tx({x:x, y:y+r+17,
    'text-anchor':'middle','dominant-baseline':'middle',
    'font-size':13,'font-weight':800,'letter-spacing':'0.05em',
    'font-family':'Inter,sans-serif', fill:CY}, lbl));

  // Subtitle (below label, small gray)
  app(svg, tx({x:x, y:y+r+32,
    'text-anchor':'middle','dominant-baseline':'middle',
    'font-size':7.5,'font-weight':400,
    'font-family':'Inter,sans-serif', fill:GREY}, sub));

  // EA pill tag (below subtitle)
  const eaY = y + r + 50;
  // Estimate width: ~4.5px per char + 20px padding
  const eaW = Math.min(ea.length * 4.5 + 20, 260);
  app(svg,
    el('rect',{x:x-eaW/2, y:eaY-9, width:eaW, height:18, rx:9, fill:'url(#eg)'}),
    tx({x:x, y:eaY,
        'text-anchor':'middle','dominant-baseline':'middle',
        'font-size':7,'font-weight':600,
        'font-family':'Inter,sans-serif', fill:'#fff'}, ea)
  );
});

/* ─── DRAW NODES — PASS 2: number badges on top of circles ───── */
N.forEach(n=>{
  if(!n.num) return;
  const {x,y,r,filled,num} = n;
  // Badge sits at top-left, center is on the circle edge (45° diagonal)
  const bx = x - Math.round(r * 0.7);
  const by = y - Math.round(r * 0.7);
  app(svg,
    el('circle',{cx:bx,cy:by,r:12,fill:filled?'#fff':CY,stroke:'#fff','stroke-width':1.5}),
    tx({x:bx,y:by,'text-anchor':'middle','dominant-baseline':'middle',
        'font-size':8,'font-weight':800,'font-family':'Inter,sans-serif',
        fill:filled?CY:'#fff'}, num)
  );
});

/* ─── EXECUTION TAGS ─────────────────────────────────────────── */
// Orange floating labels connecting to each node with a dashed line
const EC='#E07B1A'; // execution orange

// Width estimator: ASCII ~4px, CJK ~7px, space 2.5px at 7px Inter
const tw=s=>s.split('').reduce((a,c)=>{const n=c.charCodeAt(0);return a+(n>127?7:c===' '?2.5:4);},0)+22;

// [label, nodeIndex, anchor:'L'|'R', tagCenterX, tagCenterY]
const ETAGS=[
  ['EXE 01 · 60s 短片',   1,'L', 72,  245],
  ['EXE 03 · 大富翁',     2,'L', 55,  395],
  ['EXE 04 · CaaS 訂閱',  3,'L', 70,  535],
  ['TaaP · 命名廁所',      0,'R',770,  148],
  ['EXE 02 · 社媒挑戰',   5,'R',1185, 252],
  ['EXE 05 · GEO 策略',   6,'R',1193, 422],
];

ETAGS.forEach(([lbl,ni,anc,tagX,tagY])=>{
  const n=N[ni];
  const w=tw(lbl);
  // Connector endpoints
  const nodePt = anc==='L' ? n.x-n.r-4 : n.x+n.r+4;
  const tagPt  = anc==='L' ? tagX+w/2+2 : tagX-w/2-2;
  const [lx1,lx2] = anc==='L' ? [tagPt,nodePt] : [nodePt,tagPt];
  app(svg,
    // Dashed connector
    el('line',{x1:lx1,y1:tagY,x2:lx2,y2:tagY,
      stroke:EC,'stroke-width':1.3,'stroke-dasharray':'4 3',opacity:0.7}),
    // Dot at node edge
    el('circle',{cx:nodePt,cy:tagY,r:3.5,fill:EC,opacity:0.85}),
    // Pill tag
    el('rect',{x:tagX-w/2,y:tagY-10,width:w,height:20,rx:10,fill:EC}),
    tx({x:tagX,y:tagY,'text-anchor':'middle','dominant-baseline':'middle',
        'font-size':7.5,'font-weight':700,'font-family':'Inter,sans-serif',fill:'#fff'},lbl)
  );
});

/* ─── BOTTOM TEXT ─────────────────────────────────────────────── */
app(svg,
  tx({x:W/2, y:H-11,
      'text-anchor':'middle','dominant-baseline':'middle',
      'font-size':7,'font-weight':700,'letter-spacing':'0.22em',
      'font-family':'Inter,sans-serif', fill:CY, opacity:0.38},
     'FLYWHEEL GAINS MOMENTUM WITH EVERY COMPLETED TOILET'),
  tx({x:W-10, y:H-11,
      'text-anchor':'end','dominant-baseline':'middle',
      'font-size':7,'font-weight':400,'letter-spacing':'0.06em',
      'font-family':'Inter,sans-serif', fill:'#BFBFBF'},
     'CUHK COMM3400B · THE WAY × ADOL · World Toilet Day 2026')
);

/* ─── LEGEND ─────────────────────────────────────────────────── */
// Positioned top-right, clear of all nodes
const legItems=[
  {circle:true, fill:'#fff', stroke:CY, txt:'Campaign stage'},
  {circle:true, fill:CY,    stroke:'',  txt:'Conversion node (GIVE)'},
  {rect:true,   fill:'url(#eg)',        txt:'EA dimension'},
  {rect:true,   fill:'#E07B1A',         txt:'Execution / Initiative'},
];
const lx=W-182, ly=118;
app(svg, el('rect',{x:lx-10,y:ly-14,width:178,height:92,rx:7,
  fill:'#F0FBFF',stroke:CY+'55','stroke-width':1}));
legItems.forEach((it,i)=>{
  const iy=ly+i*21;
  if(it.circle){
    app(svg,
      el('circle',{cx:lx+8,cy:iy,r:7,fill:it.fill,stroke:it.stroke||CY,'stroke-width':1.5}),
      tx({x:lx+22,y:iy,'text-anchor':'start','dominant-baseline':'middle',
          'font-size':8.5,'font-weight':500,'font-family':'Inter,sans-serif',fill:'#3A6080'},it.txt)
    );
  } else {
    app(svg,
      el('rect',{x:lx+1,y:iy-7,width:14,height:14,rx:7,fill:it.fill}),
      tx({x:lx+22,y:iy,'text-anchor':'start','dominant-baseline':'middle',
          'font-size':8.5,'font-weight':500,'font-family':'Inter,sans-serif',fill:'#3A6080'},it.txt)
    );
  }
});
</script>
</body>
</html>
